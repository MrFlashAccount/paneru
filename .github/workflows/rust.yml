name: Tests/Lints

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "11.0"

jobs:
  tests-lints:
    name: Tests/Lints
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Rust cache key
        id: rust_cache_key
        run: echo "version=$(rustc -Vv | shasum -a 256 | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo crates and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: paneru-rust-v2-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust_cache_key.outputs.version }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            paneru-rust-v2-${{ runner.os }}-${{ runner.arch }}-${{ steps.rust_cache_key.outputs.version }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test bundle version resolver
        run: ./scripts/test-resolve-bundle-version.sh

      - name: Run Clippy
        run: cargo clippy --locked --bin paneru -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets -- --test-threads=1
